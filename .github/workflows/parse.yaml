name: Parse

on:
  push:
    paths:
      - github-status-history.atom
  workflow_run:
    workflows:
      - Flat
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  parse:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
      - name: Run parser
        timeout-minutes: 30
        run: |
          set -euo pipefail

          max_attempts=5
          attempt=1
          sleep_seconds=20
          while true; do
            echo "Parser attempt ${attempt}/${max_attempts}"

            set +e
            output="$(
              uv run python scripts/extract_incidents.py \
                --out parsed \
                --incidents-format jsonl \
                --enrich-impact \
                --impact-delay 0.1 2>&1
            )"
            status=$?
            set -e

            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              break
            fi

            if ! printf '%s' "$output" | grep -Eqi "timeouterror|timed out"; then
              echo "Parser failed with non-timeout error; not retrying."
              exit "$status"
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Parser failed after ${max_attempts} timeout attempts."
              exit "$status"
            fi

            echo "Timeout detected; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            attempt=$(( attempt + 1 ))
            sleep_seconds=$(( sleep_seconds * 2 ))
          done
      - name: Commit outputs
        run: |
          if git status --porcelain | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add parsed .cache/impact.json
            git commit -m "automation: update parsed incidents"
            max_attempts=3
            attempt=1
            while true; do
              if git push origin HEAD:master; then
                break
              fi

              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Push failed after ${max_attempts} attempts."
                exit 1
              fi

              echo "Push rejected; rebasing on origin/master and retrying..."
              git pull --rebase origin master
              attempt=$(( attempt + 1 ))
            done
          else
            echo "No changes to commit."
          fi
